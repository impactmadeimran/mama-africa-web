name: Deploy Cloudflare Worker

on:
  push:
    branches:
      - main
      - develop

concurrency:
  group: cloudflare-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Optional: add `production` / `development` environments so branch-specific secrets override repo secrets.
    environment:
      name: ${{ github.ref_name == 'main' && 'production' || 'development' }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Client bundle (import.meta.env) — match Worker vars on deploy (repository or env secrets).
      - name: Build
        env:
          VITE_API_PROXY_TARGET: ${{ secrets.VITE_API_PROXY_TARGET }}
        run: pnpm run build

      # Same values as Worker plaintext vars on Cloudflare (non-secret bindings; values from GitHub Secrets).
      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DEPLOY_ENV: ${{ github.ref_name == 'main' && 'production' || 'development' }}
          VITE_API_PROXY_TARGET: ${{ secrets.VITE_API_PROXY_TARGET }}
        run: |
          pnpm exec wrangler deploy \
            --var "DEPLOY_ENV:${DEPLOY_ENV}" \
            --var "VITE_API_PROXY_TARGET:${VITE_API_PROXY_TARGET}"
